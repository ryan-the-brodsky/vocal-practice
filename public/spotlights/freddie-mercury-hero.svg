<svg width="2560" height="1440" viewBox="0 0 2560 1440" xmlns="http://www.w3.org/2000/svg">
  <!-- DESIGN.md tokens: bg=bg-emphasis #2c2118 | border=border-on-emphasis #4a3d33 | accent=accent-on-emphasis #e09238
       headline=text-on-emphasis #f5efe4 | subline=text-on-emphasis-dim #c4b3a0 -->
  <rect width="2560" height="1440" fill="#2c2118"/>

  <!-- faint staff lines across the lower band -->
  <g stroke="#4a3d33" stroke-width="3" opacity="0.55">
    <line x1="0" y1="1158" x2="2560" y2="1158"/>
    <line x1="0" y1="1209" x2="2560" y2="1209"/>
    <line x1="0" y1="1260" x2="2560" y2="1260"/>
    <line x1="0" y1="1311" x2="2560" y2="1311"/>
    <line x1="0" y1="1362" x2="2560" y2="1362"/>
  </g>

  <!-- ascending warm-up scale, final note flips up an octave (cream) -->
  <g>
    <g fill="#e09238" stroke="#e09238">
      <ellipse cx="1376" cy="1399" rx="29" ry="21" transform="rotate(-20 1376 1399)" stroke="none"/>
      <line x1="1401" y1="1393" x2="1401" y2="1254" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="1564" cy="1361" rx="29" ry="21" transform="rotate(-20 1564 1361)" stroke="none"/>
      <line x1="1589" y1="1355" x2="1589" y2="1216" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="1751" cy="1322" rx="29" ry="21" transform="rotate(-20 1751 1322)" stroke="none"/>
      <line x1="1776" y1="1316" x2="1776" y2="1177" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="1939" cy="1284" rx="29" ry="21" transform="rotate(-20 1939 1284)" stroke="none"/>
      <line x1="1964" y1="1278" x2="1964" y2="1139" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="2127" cy="1246" rx="29" ry="21" transform="rotate(-20 2127 1246)" stroke="none"/>
      <line x1="2152" y1="1240" x2="2152" y2="1101" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="2315" cy="1207" rx="29" ry="21" transform="rotate(-20 2315 1207)" stroke="none"/>
      <line x1="2340" y1="1201" x2="2340" y2="1062" stroke-width="6" stroke-linecap="round"/>
    </g>
    <g fill="#f5efe4" stroke="#f5efe4">
      <ellipse cx="2502" cy="1079" rx="29" ry="21" transform="rotate(-20 2502 1079)" stroke="none"/>
      <line x1="2527" y1="1073" x2="2527" y2="934" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <!-- inset border -->
  <rect x="70" y="70" width="2420" height="1300" rx="30" fill="none" stroke="#4a3d33" stroke-width="3"/>

  <!-- eyebrow -->
  <text x="181" y="340" font-family="General Sans" font-weight="600" font-size="40" letter-spacing="7.5" fill="#e09238">ARTIST SPOTLIGHT</text>

  <!-- headline -->
  <text x="171" y="620" font-family="Fraunces" font-weight="600" font-size="198" fill="#f5efe4">Freddie Mercury&#8217;s</text>
  <text x="171" y="852" font-family="Fraunces" font-weight="600" font-size="198" fill="#f5efe4">Power, Decoded</text>

  <!-- subline -->
  <text x="177" y="1030" font-family="General Sans" font-weight="400" font-size="58" fill="#c4b3a0">The belt, the growl, the racing vibrato &#8212;</text>
  <text x="177" y="1108" font-family="General Sans" font-weight="400" font-size="58" fill="#c4b3a0">power without pushing, explained by vocal coaches.</text>

  <!-- brand mark (knockout so staff lines don't strike through) -->
  <rect x="160" y="1212" width="448" height="78" fill="#2c2118"/>
  <text x="181" y="1268" font-family="General Sans" font-weight="600" font-size="51" fill="#e09238">vocalhabit.com</text>
</svg>
