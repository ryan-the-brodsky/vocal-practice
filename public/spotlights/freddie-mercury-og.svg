<svg width="2400" height="1260" viewBox="0 0 2400 1260" xmlns="http://www.w3.org/2000/svg">
  <!-- DESIGN.md tokens: bg=bg-emphasis #2c2118 | border=border-on-emphasis #4a3d33 | accent=accent-on-emphasis #e09238
       headline=text-on-emphasis #f5efe4 | subline=text-on-emphasis-dim #c4b3a0 -->
  <rect width="2400" height="1260" fill="#2c2118"/>

  <!-- faint staff lines across the lower band -->
  <g stroke="#4a3d33" stroke-width="3" opacity="0.55">
    <line x1="0" y1="1006" x2="2400" y2="1006"/>
    <line x1="0" y1="1054" x2="2400" y2="1054"/>
    <line x1="0" y1="1102" x2="2400" y2="1102"/>
    <line x1="0" y1="1150" x2="2400" y2="1150"/>
    <line x1="0" y1="1198" x2="2400" y2="1198"/>
  </g>

  <!-- ascending warm-up scale, final note flips up an octave (cream) -->
  <g>
    <g fill="#e09238" stroke="#e09238">
      <ellipse cx="1290" cy="1232" rx="27" ry="20" transform="rotate(-20 1290 1232)" stroke="none"/>
      <line x1="1314" y1="1226" x2="1314" y2="1096" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="1466" cy="1196" rx="27" ry="20" transform="rotate(-20 1466 1196)" stroke="none"/>
      <line x1="1490" y1="1190" x2="1490" y2="1060" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="1642" cy="1160" rx="27" ry="20" transform="rotate(-20 1642 1160)" stroke="none"/>
      <line x1="1666" y1="1154" x2="1666" y2="1024" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="1818" cy="1124" rx="27" ry="20" transform="rotate(-20 1818 1124)" stroke="none"/>
      <line x1="1842" y1="1118" x2="1842" y2="988" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="1994" cy="1088" rx="27" ry="20" transform="rotate(-20 1994 1088)" stroke="none"/>
      <line x1="2018" y1="1082" x2="2018" y2="952" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="2170" cy="1052" rx="27" ry="20" transform="rotate(-20 2170 1052)" stroke="none"/>
      <line x1="2194" y1="1046" x2="2194" y2="916" stroke-width="6" stroke-linecap="round"/>
    </g>
    <g fill="#f5efe4" stroke="#f5efe4">
      <ellipse cx="2346" cy="932" rx="27" ry="20" transform="rotate(-20 2346 932)" stroke="none"/>
      <line x1="2370" y1="926" x2="2370" y2="796" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <!-- inset border -->
  <rect x="66" y="66" width="2268" height="1128" rx="28" fill="none" stroke="#4a3d33" stroke-width="3"/>

  <!-- eyebrow -->
  <text x="170" y="292" font-family="General Sans" font-weight="600" font-size="38" letter-spacing="7" fill="#e09238">ARTIST SPOTLIGHT</text>

  <!-- headline -->
  <text x="160" y="548" font-family="Fraunces" font-weight="600" font-size="185" fill="#f5efe4">Freddie Mercury&#8217;s</text>
  <text x="160" y="750" font-family="Fraunces" font-weight="600" font-size="185" fill="#f5efe4">Power, Decoded</text>

  <!-- subline -->
  <text x="166" y="906" font-family="General Sans" font-weight="400" font-size="54" fill="#c4b3a0">The belt, the growl, the racing vibrato &#8212;</text>
  <text x="166" y="982" font-family="General Sans" font-weight="400" font-size="54" fill="#c4b3a0">power without pushing, explained by vocal coaches.</text>

  <!-- brand mark (knockout so staff lines don't strike through) -->
  <rect x="150" y="1066" width="420" height="72" fill="#2c2118"/>
  <text x="170" y="1118" font-family="General Sans" font-weight="600" font-size="48" fill="#e09238">vocalhabit.com</text>
</svg>
